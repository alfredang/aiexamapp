    <radialGradient id="halo" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#7EF5FF" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#001B34" stop-opacity="0"/>
