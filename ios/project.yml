name: AIExams
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
targets:
  AIExams:
    type: application
    platform: iOS
    sources:
      - AIExams
    info:
      path: AIExams/Info.plist
      properties:
        CFBundleDisplayName: "AI Exams"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.aiexams
        DEVELOPMENT_TEAM: GU9WTSTX9M
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 5
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
