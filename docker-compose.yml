services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiexams
      POSTGRES_PASSWORD: aiexams
      POSTGRES_DB: aiexams
    ports: ["55432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  mailhog:
    image: mailhog/mailhog:latest
    ports: ["1025:1025", "8025:8025"]

  app:
    build: .
    depends_on: [postgres, mailhog]
    environment:
      DATABASE_URL: postgresql://aiexams:aiexams@postgres:5432/aiexams?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "AI Exams <noreply@local>"
      PAYPAL_ENV: sandbox
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-sb}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe!2026}
    ports: ["3000:3000"]

volumes:
  pgdata:
